apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: telco
  labels:
    app: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8100"
    spec:
      containers:
        - name: kong
          image: kong:3.5
          ports:
            - { containerPort: 8000, name: proxy }
            - { containerPort: 8443, name: proxy-ssl }
            - { containerPort: 8100, name: status }
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /etc/kong/kong.yml
            - name: KONG_PROXY_LISTEN
              value: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
            - name: KONG_LOG_LEVEL
              value: warn
            - name: KONG_PLUGINS
              value: "bundled,prometheus"
          volumeMounts:
            - name: kong-config
              mountPath: /etc/kong
              readOnly: true
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: 2000m, memory: 1Gi }
          livenessProbe:
            httpGet: { path: /status, port: 8100 }
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /status, port: 8100 }
            periodSeconds: 10
      volumes:
        - name: kong-config
          configMap:
            name: kong-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: telco
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
spec:
  type: LoadBalancer
  selector: { app: api-gateway }
  ports:
    - { name: http, port: 80, targetPort: 8000 }
    - { name: https, port: 443, targetPort: 8443 }
