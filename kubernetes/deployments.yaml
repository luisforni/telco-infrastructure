---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: call-orchestrator
  namespace: telco
  labels:
    app: call-orchestrator
    version: "1.0"
spec:
  replicas: 3
  selector:
    matchLabels: { app: call-orchestrator }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels:
        app: call-orchestrator
        version: "1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: call-orchestrator }
              topologyKey: kubernetes.io/hostname
      containers:
        - name: orchestrator
          image: ghcr.io/telco/call-orchestrator:latest
          ports:
            - { containerPort: 8080, name: http }
            - { containerPort: 50051, name: grpc }
          envFrom:
            - configMapRef: { name: telco-config }
            - secretRef:    { name: telco-secrets }
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits:   { cpu: 1000m, memory: 1Gi }
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: call-orchestrator
  namespace: telco
spec:
  selector: { app: call-orchestrator }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
    - { name: grpc, port: 50051, targetPort: 50051 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asr-service
  namespace: telco
  labels:
    app: asr-service
spec:
  replicas: 4
  selector:
    matchLabels: { app: asr-service }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 2, maxUnavailable: 0 }
  template:
    metadata:
      labels:
        app: asr-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      nodeSelector: { workload: ml }
      tolerations:
        - { key: workload, operator: Equal, value: ml, effect: NoSchedule }
      containers:
        - name: asr
          image: ghcr.io/telco/asr-service:latest
          ports:
            - { containerPort: 8001, name: http }
          env:
            - name: PORT
              value: "8001"
            - name: WORKERS
              value: "1"
          envFrom:
            - configMapRef: { name: telco-config }
            - secretRef:    { name: telco-secrets }
          resources:
            requests: { cpu: 1000m, memory: 2Gi }
            limits:   { cpu: 4000m, memory: 8Gi }
          livenessProbe:
            httpGet: { path: /healthz, port: 8001 }
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /healthz, port: 8001 }
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: asr-service
  namespace: telco
spec:
  selector: { app: asr-service }
  ports:
    - { name: http, port: 8001, targetPort: 8001 }
